<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolyTrend - 我的</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./common.css" />
</head>
<body data-tab="profile" data-doc-title-zh="PolyTrend - 我的" data-doc-title-en="PolyTrend - Profile">
  <div class="phone-page app-shell relative">
    <header class="top-bar">
      <div class="top-row">
        <div class="top-title" data-i18n-zh="PolyTrend - 资讯速递" data-i18n-en="PolyTrend - News Feed">PolyTrend - 资讯速递</div>
        <div class="clock" data-clock></div>
        <button class="lang-switch" data-lang-toggle>简体中文 | EN</button>
      </div>
      <div class="page-title" data-title-zh="👤 我的" data-title-en="👤 Profile">👤 我的</div>
    </header>

    <main class="scroll-area space-y-3">
      <section class="td-card p-4">
        <div class="flex items-center gap-3">
          <div class="avatar">M</div>
          <div>
            <h3 class="text-base font-bold">Morph User</h3>
            <p class="text-xs text-slate-500 mt-1" data-i18n-zh="已登录 · openid: oYhW7x***" data-i18n-en="Logged in · openid: oYhW7x***">已登录 · openid: oYhW7x***</p>
          </div>
        </div>
      </section>

      <a class="section-link" href="./favorites.html">
        <span data-i18n-zh="我的收藏" data-i18n-en="My Favorites">我的收藏</span>
        <span class="section-link-tail" data-i18n-zh="管理 >" data-i18n-en="Manage >">管理 ></span>
      </a>

      <article class="td-card">
        <div class="card-body">
          <h3 class="card-title" data-i18n-zh="美国 2028 总统大选中，民主党候选人是否将赢得普选？" data-i18n-en="Will the Democratic candidate win the popular vote in the 2028 US presidential election?">美国 2028 总统大选中，民主党候选人是否将赢得普选？</h3>
          <div class="meta-row"><span data-i18n-zh="收藏于 2026-03-02 22:15" data-i18n-en="Favorited on 2026-03-02 22:15">收藏于 2026-03-02 22:15</span></div>
          <div class="card-footer">
            <span data-i18n-zh="可点击查看详情" data-i18n-en="Tap to view details">可点击查看详情</span>
            <span class="link-btn" data-i18n-zh="查看原文 →" data-i18n-en="View Source →">查看原文 →</span>
            <button class="fav-btn active">♥</button>
          </div>
        </div>
      </article>

      <article class="td-card">
        <div class="card-body">
          <h3 class="card-title" data-i18n-zh="欧盟 AI 监管法案是否在本季度前正式生效？" data-i18n-en="Will the EU AI regulation take effect before the end of this quarter?">欧盟 AI 监管法案是否在本季度前正式生效？</h3>
          <div class="meta-row"><span data-i18n-zh="收藏于 2026-03-01 11:03" data-i18n-en="Favorited on 2026-03-01 11:03">收藏于 2026-03-01 11:03</span></div>
          <div class="card-footer">
            <span data-i18n-zh="长按可取消收藏" data-i18n-en="Long press to remove favorite">长按可取消收藏</span>
            <span class="link-btn" data-i18n-zh="查看原文 →" data-i18n-en="View Source →">查看原文 →</span>
            <button class="fav-btn active">♥</button>
          </div>
        </div>
      </article>

      <div class="section-title" data-i18n-zh="设置" data-i18n-en="Settings">设置</div>
      <section class="td-card">
        <button class="setting-row"><span data-i18n-zh="语言切换" data-i18n-en="Language">语言切换</span><span class="text-slate-400" data-i18n-zh="简体中文 >" data-i18n-en="English >">简体中文 ></span></button>
        <button class="setting-row"><span data-i18n-zh="关于我们" data-i18n-en="About Us">关于我们</span><span class="text-slate-400">PolyTrend v1.0 ></span></button>
        <button class="setting-row"><span data-i18n-zh="版本号" data-i18n-en="Version">版本号</span><span class="text-slate-400">1.0.0</span></button>
        <button class="setting-row"><span style="color:#c62828" data-i18n-zh="退出登录" data-i18n-en="Log Out">退出登录</span><span class="text-slate-400">></span></button>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="tab-item" data-tab-key="trending"><span>🔥</span><span data-i18n-zh="热点" data-i18n-en="Trending">热点</span></button>
      <button class="tab-item" data-tab-key="breaking"><span>⚡</span><span data-i18n-zh="突发" data-i18n-en="Breaking">突发</span></button>
      <button class="tab-item" data-tab-key="latest"><span>🆕</span><span data-i18n-zh="最新" data-i18n-en="New">最新</span></button>
      <button class="tab-item" data-tab-key="whales"><span>🐳</span><span data-i18n-zh="巨鲸" data-i18n-en="Whales">巨鲸</span></button>
      <button class="tab-item" data-tab-key="profile"><span>👤</span><span data-i18n-zh="我的" data-i18n-en="Profile">我的</span></button>
    </nav>
  </div>

  <script src="./common.js"></script>
</body>
</html>
